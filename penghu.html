<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>
    <title>澎湖 PokemonGo 通報範圍</title>
    <script type="text/javascript" src="http://maps.google.com/maps/api/js?sensor=false&language=zh-TW"></script>
    <script type="text/javascript">
	var g = google.maps;
	var map;
	var c= new g.LatLng(23.5692,119.594);//地圖中心座標
	var z = 14;//地圖縮放比例（數值越大，細節越清楚）
	var n = 8;//圓圈數
	var p = new Array();//圓心位置23.580549, 119.573619
  // Y,X
	p[1] = new g.LatLng(23.567414, 119.565868);//紅色區域圓心座標。以下同類各項視需要增刪
	p[2] = new g.LatLng(23.567972, 119.583804);//綠色區域
	p[3] = new g.LatLng(23.582290, 119.572545);//藍色區域
	p[4] = new g.LatLng(23.557001, 119.599640);//橘色區域
  p[5] = new g.LatLng(23.574437, 119.604823);//黃色區域
  p[6] = new g.LatLng(23.664234, 119.596184);//白沙
  p[7] = new g.LatLng(23.545531, 119.614925);//烏崁
  p[8] = new g.LatLng(23.521238, 119.597805);//鎖港
	//var l = 1100;//半徑，單位為公尺
  var l = new Array();
  l[1] = 1000;//紅色區域
  l[2] = 1200;//綠色區域
  l[3] = 1000;//藍色區域
  l[4] = 1200;//橘色區域
  l[5] = 1000;//黃色區域
  l[6] = 1000;//白沙
  l[7] = 1000;//烏崁
  l[8] = 1200;//鎖港
	//var bc = '#000000';//圓周顏色
  var bc = new Array();
  bc[1] = '#000000';
  bc[2] = '#000000';
  bc[3] = '#000000';
  bc[4] = '#000000';
  bc[5] = '#000000';
  bc[6] = '#000000';
  bc[7] = '#000000';
  bc[8] = '#000000';
	// var fc = '#FF0000';//圓內顏色
  var fc = new Array();
  fc[1] = '#FF0000';
  fc[2] = '#00FF00';
  fc[3] = '#0000FF';
  fc[4] = '#FF7100';
  fc[5] = '#e3ff00';
  fc[6] = '#e3abbe';
  fc[7] = '#e3abbe';
  fc[8] = '#e3abbe';
	var ic = 'map-pin.png';//標誌圖案；若刪除，則恢復預設標誌
	var m = new Array();//標誌物件
	var r = new Array();//圓圈物件
	var t = new Array();//標誌說明文字
	t[1] = "市中心";//標誌說明文字內容。以下同類各項視需要增刪
	t[2] = "文學路";
	t[3] = "五福路";
	t[4] = "市中心";
  t[5] = "東衛";
  t[6] = "白沙";
  t[7] = "烏崁";
  t[8] = "鎖港";
	var wo = true;//是否顯示地圖說明視窗。true＝是；false＝否
	var wc = false;//是否自動關閉地圖說明視窗。true＝是；false＝否
	var wt = 5000;//自動關閉地圖說明視窗預設時間，計時單位為千分之一秒
	var mt = '澎湖通報範圍';//地圖總說明
	var w = new g.InfoWindow({
		content: mt, position: c,
        })
	function addCircles() {
    		for (i = 1; i <= n; i++) {
			m[i] = new g.Marker({map: map,position: p[i],icon: ic,zIndex: 80 - i,title: t[i]});
			r[i] = new g.Circle({map: map,radius: l[i],fillColor: fc[i],strokeWeight: 1,strokeColor: bc[i]});
			r[i].bindTo('center', m[i], 'position');
		}
	}
	function load() {
  		var mapDiv = document.getElementById('map-canvas');
  		map = new g.Map(mapDiv, {center: c,zoom: z,mapTypeId: g.MapTypeId.TERRAIN});
		x =addCircles();
		if(wo==true){
			w.open(map);
			if(wc==true){
				var o =setTimeout("w.close()",wt);
			}
		}
	}
</script>
</head>
<body style="border: 0 none; margin:0; padding:0; font-family: 新細明體" onload="load()">
	<div id="map-canvas" style="width: 900px; height: 630px; margin: 0; padding:0;"></div>
 </body>

</html>​
